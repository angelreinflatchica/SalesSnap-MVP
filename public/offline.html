<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SalesSnap Offline</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f0fdf4;
        color: #14532d;
      }
      .card {
        background: #fff;
        border: 1px solid #bbf7d0;
        border-radius: 12px;
        padding: 24px;
        max-width: 420px;
        text-align: center;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0;
        font-size: 14px;
        color: #166534;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>SalesSnap will keep your changes and sync when internet returns.</p>
    </div>
  </body>
</html>
